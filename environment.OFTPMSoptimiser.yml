name: OFTPMSoptimiser
channels:
  - conda-forge
dependencies:
  # ---- Core ----
  - python=3.11
  - pip
  - setuptools
  - wheel
  - grpcio>=1.60.0
  - grpcio-tools>=1.60.0
  - PyYAML>=6.0

  # ---- Python / Jupyter ----
  - ipython
  - ipykernel
  - jupyter_client
  - jupyter_core
  - debugpy
  - traitlets
  - pygments
  - prompt-toolkit
  - jedi
  - parso
  - stack_data
  - executing
  - asttokens
  - decorator
  - platformdirs
  - wcwidth
  - comm
  - nest-asyncio
  - pandas

  # ---- Scientific ----
  - numpy=2.2.6
  - scipy=1.15.2
  - matplotlib
