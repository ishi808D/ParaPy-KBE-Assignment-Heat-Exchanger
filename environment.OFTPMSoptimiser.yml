  - pycparser
  - libffi
  - openssl
  - krb5
  - libedit
  - ncurses
  - readline
  - sqlite
  - zlib
  - xz
  - bzip2
  - icu
  - libsodium
  - tbb

  # ---- .NET / interop ----
  - pythonnet
  - clr_loader

