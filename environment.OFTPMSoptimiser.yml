  - pyzmq
  - zeromq
  - psutil
  - python-dateutil
  - six
  - jax=0.6.0
  - jaxlib=0.6.0
  - "shapely>=2.0,<3.0"
  - chex=0.1.88
  - pyamg=5.2.1
  - pypardiso

  # ---- C / system deps (let conda resolve exact builds) ----
